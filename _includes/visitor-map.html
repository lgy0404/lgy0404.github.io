<style>
  #visitor-map-section {
    margin: 48px 0 32px;
    font-family: inherit;
  }
  #visitor-map-section h3 {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: #333;
  }
  #visitor-map-section .map-subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 10px;
  }
  #visitor-map-section .visitor-count {
    display: inline-block;
    height: 18px;
    width: auto;
    filter: invert(1);
    vertical-align: text-bottom;
  }
  #map-container {
    position: relative;
    min-height: 260px;
    background: #f0f4f8;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e2e8f0;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    max-width: 640px;
    margin-left: 0;
    margin-right: auto;
  }
  #map-container svg {
    display: block;
    width: 100%;
    height: auto;
  }
  .country-base {
    fill: #d4dde8;
    stroke: #fff;
    stroke-width: 0.5px;
  }
  .visitor-dot {
    fill: #ef4444;
    stroke: #fff;
    stroke-width: 1.5px;
    opacity: 0.85;
  }
  .visitor-dot-ring {
    fill: none;
    stroke: #ef4444;
    stroke-width: 1px;
    opacity: 0.3;
  }
  .you-are-here {
    fill: #f97316;
    stroke: #fff;
    stroke-width: 2px;
    animation: pulse-dot 2s ease-out infinite;
  }
  #map-tooltip {
    position: absolute;
    background: rgba(15, 23, 42, 0.88);
    color: #f1f5f9;
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 6px;
    pointer-events: none;
    display: none;
    white-space: nowrap;
    z-index: 10;
  }
  #map-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f4f8;
    font-size: 0.85rem;
    color: #94a3b8;
    z-index: 5;
    border-radius: 12px;
  }
  .map-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid #cbd5e1;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }
  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }
  @keyframes pulse-dot {
    0% {
      r: 5px;
      opacity: 1;
    }
    70% {
      r: 9px;
      opacity: 0.3;
    }
    100% {
      r: 5px;
      opacity: 1;
    }
  }
</style>

<div id="visitor-map-section">
  <h3>&#127758; Visitor Footprints</h3>
  <p class="map-subtitle">
    <span><img class="visitor-count" src="https://visitor-badge.laobi.icu/badge?page_id=https://lgy0404.github.io/&left_text=%20&left_color=000000&right_color=000000" alt="Visitor count" loading="lazy" decoding="async" /> visitors from around the world</span>
  </p>
  <div id="map-container">
    <div id="map-loading">
      <div class="map-spinner"></div>
      Loading visitor map&hellip;
    </div>
    <div id="map-tooltip"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
(function () {
  var SUPABASE_URL = '{{ site.visitor_map.supabase_url | default: "" | strip | escape }}';
  var SUPABASE_ANON_KEY = '{{ site.visitor_map.supabase_anon_key | default: "" | strip | escape }}';
  var hasVisitorStorage = SUPABASE_URL && SUPABASE_ANON_KEY;
  var authHeaders = hasVisitorStorage ? {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json'
  } : null;

  loadVisitorRecords().then(function (visitors) {
    geolocateAndRender(visitors);
  });

  function loadVisitorRecords() {
    if (!hasVisitorStorage) {
      return Promise.resolve([]);
    }

    return fetch(SUPABASE_URL + '/rest/v1/visitor_locations?select=country,city,lat,lng', {
      headers: authHeaders
    })
      .then(function (response) {
        return response.ok ? response.json() : [];
      })
      .catch(function () {
        return [];
      });
  }

  function geolocateAndRender(visitors) {
    fetch('https://ipapi.co/json/')
      .then(function (response) {
        return response.ok ? response.json() : null;
      })
      .catch(function () {
        return null;
      })
      .then(function (geo) {
        var me = null;

        if (geo && geo.latitude && geo.longitude) {
          me = {
            lat: geo.latitude,
            lng: geo.longitude,
            country: geo.country_name,
            city: geo.city
          };

          if (hasVisitorStorage) {
            recordVisit(me);
          }
        }

        drawMap(visitors, me);
      });
  }

  function recordVisit(visitor) {
    fetch(SUPABASE_URL + '/rest/v1/visitor_locations', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(visitor)
    }).catch(function () {});
  }

  function drawMap(visitors, me) {
    var container = document.getElementById('map-container');
    var loading = document.getElementById('map-loading');
    var width = container.clientWidth || 800;
    var height = Math.round(width * 0.52);

    var svg = d3.select('#map-container')
      .append('svg')
      .attr('viewBox', '0 0 ' + width + ' ' + height)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    var projection = d3.geoNaturalEarth1()
      .scale(width / 6.2)
      .translate([width / 2, height / 2]);

    var path = d3.geoPath().projection(projection);

    svg.append('path')
      .datum(d3.geoGraticule()())
      .attr('fill', 'none')
      .attr('stroke', '#c8d5e2')
      .attr('stroke-width', 0.3)
      .attr('d', path);

    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(function (world) {
        var countries = topojson.feature(world, world.objects.countries).features;

        svg.selectAll('.land')
          .data(countries)
          .join('path')
          .attr('class', 'country-base')
          .attr('d', path);

        svg.append('path')
          .datum({ type: 'Sphere' })
          .attr('fill', 'none')
          .attr('stroke', '#b0c0d0')
          .attr('stroke-width', 0.8)
          .attr('d', path);

        visitors.forEach(function (visitor) {
          if (visitor.lat && visitor.lng) {
            addDot(svg, projection, container, visitor, false);
          }
        });

        if (me) {
          addDot(svg, projection, container, me, true);
        }

        if (loading) {
          loading.remove();
        }
      })
      .catch(function () {
        if (loading) {
          loading.textContent = 'Map unavailable.';
        }
      });
  }

  function addDot(svg, projection, container, visitor, isCurrentVisitor) {
    var xy = projection([visitor.lng, visitor.lat]);
    if (!xy) {
      return;
    }

    svg.append('circle')
      .attr('class', 'visitor-dot-ring')
      .attr('cx', xy[0])
      .attr('cy', xy[1])
      .attr('r', isCurrentVisitor ? 10 : 7);

    svg.append('circle')
      .attr('class', isCurrentVisitor ? 'you-are-here' : 'visitor-dot')
      .attr('cx', xy[0])
      .attr('cy', xy[1])
      .attr('r', isCurrentVisitor ? 5 : 4)
      .style('pointer-events', 'all')
      .style('cursor', 'pointer')
      .on('mousemove', function (event) {
        showTooltip(container, event, visitor, isCurrentVisitor);
      })
      .on('mouseleave', function () {
        document.getElementById('map-tooltip').style.display = 'none';
      });
  }

  function showTooltip(container, event, visitor, isCurrentVisitor) {
    var tooltip = document.getElementById('map-tooltip');
    var label = visitor.city ? visitor.city + ', ' + visitor.country : visitor.country;
    var rect = container.getBoundingClientRect();

    tooltip.textContent = (isCurrentVisitor ? 'You: ' : 'Visitor: ') + label;
    tooltip.style.display = 'block';
    tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (event.clientY - rect.top - 28) + 'px';
  }
}());
</script>
